<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfólio Acadêmico{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }
        nav {
            background: #1f3c88;
            padding: 1rem;
        }
        nav a {
            color: white;
            margin-right: 1rem;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            width: 85%;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
        }
        .msg {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .card {
            border: 1px solid #ddd;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 12px;
        }
        button {
            background: #1f3c88;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .badge {
            display: inline-block;
            background: #e3eafc;
            color: #1f3c88;
            padding: 4px 8px;
            border-radius: 12px;
            margin-right: 6px;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'portfolio:lista_projetos' %}">Projetos</a>

        {% if user.is_authenticated %}
            <a href="{% url 'portfolio:criar_projeto' %}">Novo Projeto</a>
            <a href="{% url 'accounts:perfil' %}">Perfil</a>
            <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;color:white;font-weight:bold;cursor:pointer;padding:0;">
            Sair
    </button>
</form>
        {% else %}
            <a href="{% url 'accounts:login' %}">Entrar</a>
            <a href="{% url 'accounts:registro' %}">Cadastrar</a>
        {% endif %}
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="msg {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
