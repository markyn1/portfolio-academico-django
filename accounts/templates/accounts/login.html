{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Entrar</button>
</form>

<p>Ainda não tem conta? <a href="{% url 'accounts:registro' %}">Cadastre-se</a></p>
{% endblock %}
